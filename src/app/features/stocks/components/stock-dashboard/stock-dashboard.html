@if (isLoading()) {
  <div class="dashboard__grid">
    @for (_ of skeletons; track $index) {
      <app-stock-card-skeleton />
    }
  </div>
} @else {
  <div class="dashboard__grid">
    @for (stock of stocks(); track stock.symbol) {
      <app-stock-card
        [stock]="stock"
        (toggleChanged)="onToggle($event)"
      />
    }
  </div>
}
